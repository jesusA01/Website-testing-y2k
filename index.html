<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>TUFF AHH WEBSITE</h1>

    <div class="guestbook">

        <div class="header-section">
            <span> <img src="entities/star.gif" alt="error">
                Wizards Paradise Message Board <img src="entities/star.gif" alt="error"></span>

            <hr>
        </div>

        <form id="type-message">
            <label for="guest-name">Username: </label>
            <input id="guest-name" placeholder="Name" type="text" required>
            <label for="guest-message">Enter Your Message: </label>
            <textarea id="guest-message" maxlength="250" placeholder="Enter Message..." required></textarea>

            <button type="submit" id="submit">Send!</button>

        </form>

        <div id="message-section"></div>

    </div>

    <div class="winamp">
        <div class="title-bar">
            <span>-----wizards paradise</span>
            <div class="window-controls">
                <img src="entities/star.gif" alt="error">
            </div>
        </div>

        <div class="display">
            <img src="visuals/track1.gif" alt="" id="track-visual">
            <p id="current-track">TRACK_01.MP3</p>
        </div>

        <div class="playlist">
            <ul id="track-list">
                <li data-src="entities/music/sniper gonna fuk - sniper2004.mp3"
                    data-visual="entities/visuals/track1.gif">track1.mp3</li>
                <li data-src="entities/music/Van Cleef Island - Trippie Redd.mp3"
                    data-visual="entities/visuals/track2.gif">track2.mp3</li>
                <li data-src="entities/music/Juice WRLD - Oxycodone (Official Audio) - Juice WRLD.mp3"
                    data-visual="entities/visuals/track3.gif">track3.mp3</li>
                <li data-src="entities/music/Meiko Nakahara - Fantasy (1982).mp3"
                    data-visual="entities/visuals/track4.gif">track4.mp3</li>
                <li data-src="entities/music/Red Moonlight - Juice WRLD.mp3" data-visual="entities/visuals/track5.gif">
                    track5.mp3</li>
                <li data-src="entities/music/Lil Uzi Vert - Chrome Heart Tags [Official Audio] - LIL UZI VERT.mp3"
                    data-visual="entities/visuals/track6.gif">track6.mp3</li>
            </ul>
        </div>

        <audio id="audio" src="" hidden></audio>

        <div class="equalizer">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <div class="controls">

            <button id="1" class="prev"></button>
            <button id="2" class="play"></button>
            <button id="3" class="pause"></button>
            <button id="4" class="next"></button>
            <br>
            <label for="1" style="color: rgb(255, 28, 28); font-family: 'Courier New', Courier, monospace;">
                <b>PREV</b></label>

            <label for="2" style="color: rgb(255, 28, 28); font-family: 'Courier New', Courier, monospace;">
                <b>|PLAY</b></label>

            <label for="3" style="color: rgb(255, 28, 28); font-family: 'Courier New', Courier, monospace;">
                <b>|PAUSE</b></label>

            <label for="4" style="color: rgb(255, 28, 28); font-family: 'Courier New', Courier, monospace;">
                <b>|FRWRD</b></label>
        </div>
    </div>

    <footer style="font-family: 'Courier New', Courier, monospace;">

        <br>
        <p style="float: right;">© 2026 FUSIONZOMBIE 😝 || Fan-made non-commercial project. All media belongs to
            original creators.
        <p>SITE STILL IN PROGRESS</p>
        </p>

    </footer>
</body>
<script type="module" src="script.js"></script>

</html>
